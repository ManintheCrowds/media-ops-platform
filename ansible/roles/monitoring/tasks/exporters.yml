---
# Prometheus exporters setup
- name: Install Node Exporter
  docker_container:
    name: node-exporter
    image: prom/node-exporter:latest
    state: started
    restart_policy: always
    ports:
      - "9100:9100"
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
  when: node_exporter_enabled | default(true)

- name: Install cAdvisor
  docker_container:
    name: cadvisor
    image: gcr.io/cadvisor/cadvisor:latest
    state: started
    restart_policy: always
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
  when: cadvisor_enabled | default(true)

- name: Install PostgreSQL Exporter
  docker_container:
    name: postgres-exporter
    image: prometheuscommunity/postgres-exporter:latest
    state: started
    restart_policy: always
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://{{ postgres_user }}:{{ postgres_password }}@postgres:5432/{{ postgres_database }}?sslmode=disable"
  when: postgres_exporter_enabled | default(true) and postgres_user is defined
