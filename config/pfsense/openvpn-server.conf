# OpenVPN Server Configuration Template
# This is a reference configuration for OpenVPN server setup in pfSense
# Use this as a guide when configuring OpenVPN via the pfSense web interface

# Server Configuration
server_mode=peer_to_peer
protocol=udp
port=1194
interface=wan

# Network Configuration
tunnel_network=10.0.200.0/24
local_network=10.0.10.0/24,10.0.30.0/24

# Encryption
encryption_algorithm=aes-256-cbc
auth_digest_algorithm=sha256

# Authentication
tls_authentication=enabled
peer_certificate_authority=OpenVPN_CA
server_certificate=OpenVPN_Server

# Client Configuration
client_config_dir=/var/etc/openvpn-csc
push_route=10.0.10.0/24
push_route=10.0.30.0/24
push_dns=10.0.10.1

# Security Settings
compression=adaptive
tun_mtu=1500
fragment=0
mssfix=0

# Logging
verb=3
mute=20

# Notes:
# - Configure via pfSense web interface: VPN -> OpenVPN -> Servers
# - Generate CA and certificates via System -> Certificate Manager
# - Export client configs via VPN -> OpenVPN -> Client Export
# - Configure firewall rules for VPN access in Firewall -> Rules -> OpenVPN
