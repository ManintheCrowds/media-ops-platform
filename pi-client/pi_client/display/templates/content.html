<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Browser</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #1a1a1a;
            color: #fff;
            padding: 20px;
        }
        .header {
            margin-bottom: 30px;
        }
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .content-card {
            background: #2a2a2a;
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            transition: transform 0.2s;
            border: 1px solid #3a3a3a;
        }
        .content-card:hover {
            transform: translateY(-5px);
            border-color: #4a9eff;
        }
        .content-card h3 {
            margin-bottom: 10px;
            color: #4a9eff;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: #4a9eff;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="/" class="back-link">← Back to Dashboard</a>
        <h1>Content Browser</h1>
    </div>
    
    <div class="content-grid" id="content-grid">
        <div>Loading content...</div>
    </div>
    
    <script>
        async function loadContent() {
            try {
                const response = await fetch('/api/content');
                const data = await response.json();
                const grid = document.getElementById('content-grid');
                
                if (data.content && data.content.length > 0) {
                    grid.innerHTML = data.content.map(item => `
                        <div class="content-card" onclick="viewContent(${item.id})">
                            <h3>${item.title || 'Untitled'}</h3>
                            <p>${item.description || ''}</p>
                        </div>
                    `).join('');
                } else {
                    grid.innerHTML = '<div>No content available</div>';
                }
            } catch (e) {
                console.error('Failed to load content:', e);
                document.getElementById('content-grid').innerHTML = '<div>Error loading content</div>';
            }
        }
        
        function viewContent(id) {
            window.location.href = `/content/${id}`;
        }
        
        loadContent();
    </script>
</body>
</html>
