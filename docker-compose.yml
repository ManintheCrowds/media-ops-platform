version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: platform-postgres
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: platform
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - platform-network

  # Main Platform API
  platform:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: platform-api
    environment:
      DATABASE_URL: postgresql://platform:${POSTGRES_PASSWORD:-changeme}@postgres:5432/platform
      # REQUIRED: Application secret key (must be at least 32 characters)
      # Generate with: python -c "import secrets; print(secrets.token_urlsafe(32))"
      SECRET_KEY: ${SECRET_KEY}
      # REQUIRED: JWT secret key (must be at least 32 characters)
      # Generate with: python -c "import secrets; print(secrets.token_urlsafe(32))"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      DEBUG: ${DEBUG:-False}
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - platform-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Seafile - File Storage
  seafile:
    image: seafileltd/seafile-mc:latest
    container_name: platform-seafile
    environment:
      - SEAFILE_ADMIN_EMAIL=art.int.interface@gmail.com
      - SEAFILE_ADMIN_PASSWORD=cableTV21
      - DB_HOST=seafile-db
      - DB_ROOT_PASSWD=cableTV21
    volumes:
      - seafile_data:/shared
    ports:
      - "8001:80"
      - "8082:8082"
    depends_on:
      seafile-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api2/ping/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - platform-network

  seafile-db:
    image: mariadb:10.11
    container_name: platform-seafile-db
    environment:
      - MYSQL_ROOT_PASSWORD=cableTV21
      - MYSQL_DATABASE=seafile
    volumes:
      - seafile_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - platform-network

  # Jellyfin - Media Server
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: platform-jellyfin
    environment:
      - JELLYFIN_PublishedServerUrl=http://localhost:8096
    volumes:
      - jellyfin_config:/config
      - jellyfin_cache:/cache
      - ./media:/media:ro
    ports:
      - "8096:8096"
      - "8920:8920"
    networks:
      - platform-network

  # Gitea - Git Service
  gitea:
    image: gitea/gitea:latest
    container_name: platform-gitea
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - DB_TYPE=postgres
      - DB_HOST=gitea-db:5432
      - DB_NAME=gitea
      - DB_USER=gitea
      - DB_PASSWD=gitea
    volumes:
      - gitea_data:/data
    ports:
      - "3000:3000"
      - "2222:22"
    depends_on:
      - gitea-db
    networks:
      - platform-network

  gitea-db:
    image: postgres:15-alpine
    container_name: platform-gitea-db
    environment:
      - POSTGRES_USER=gitea
      - POSTGRES_PASSWORD=${GITEA_POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=gitea
    volumes:
      - gitea_db_data:/var/lib/postgresql/data
    networks:
      - platform-network

  # Prometheus - Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: platform-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - platform-network

  # Grafana - Monitoring Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: platform-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - platform-network

  # Vaultwarden - Password Manager
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: platform-vaultwarden
    environment:
      - ADMIN_TOKEN=${VAULTWARDEN_ADMIN_TOKEN:-changeme}
      - SIGNUPS_ALLOWED=true
      - WEBSOCKET_ENABLED=true
    volumes:
      - vaultwarden_data:/data
    ports:
      - "8080:80"
      - "3012:3012"
    networks:
      - platform-network

  # BookStack - Wiki and Documentation
  bookstack:
    image: lscr.io/linuxserver/bookstack:latest
    container_name: platform-bookstack
    environment:
      - PUID=1000
      - PGID=1000
      - APP_URL=http://localhost:8002
      - APP_KEY=${BOOKSTACK_APP_KEY}
      - DB_HOST=bookstack-db
      - DB_USERNAME=bookstack
      - DB_PASSWORD=${BOOKSTACK_DB_PASSWORD:-bookstack}
      - DB_DATABASE=bookstack
    volumes:
      - bookstack_data:/config
    ports:
      - "8002:80"
    depends_on:
      - bookstack-db
    networks:
      - platform-network

  bookstack-db:
    image: mariadb:10.11
    container_name: platform-bookstack-db
    environment:
      - MYSQL_ROOT_PASSWORD=${BOOKSTACK_ROOT_PASSWORD:-bookstack_root}
      - MYSQL_DATABASE=bookstack
      - MYSQL_USER=bookstack
      - MYSQL_PASSWORD=${BOOKSTACK_DB_PASSWORD:-bookstack}
    volumes:
      - bookstack_db_data:/var/lib/mysql
    networks:
      - platform-network

  # Educational System Service
  education-service:
    build:
      context: ./education-service
      dockerfile: Dockerfile
    container_name: platform-education
    environment:
      - DATABASE_URL=postgresql://education:password@education-db:5432/education
      - PLATFORM_URL=http://platform:8000
      # REQUIRED: JWT secret key (must match main platform, at least 32 characters)
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - BOOKSTACK_URL=http://bookstack:80
      - GITEA_URL=http://gitea:3000
      - SEAFILE_URL=http://seafile:8000
      - JELLYFIN_URL=http://jellyfin:8096
    volumes:
      - ./education-service:/app
      - education_storage:/app/storage
    ports:
      - "8003:8000"
    depends_on:
      - education-db
      - platform
    networks:
      - platform-network

  education-db:
    image: postgres:15-alpine
    container_name: platform-education-db
    environment:
      - POSTGRES_USER=education
      - POSTGRES_PASSWORD=${EDUCATION_POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=education
    volumes:
      - education_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U education"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - platform-network

  # Nginx - Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: platform-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - platform
      - seafile
      - jellyfin
      - gitea
      - grafana
      - vaultwarden
      - bookstack
      - education-service
      - job-automation-service
    networks:
      - platform-network

  # Security Service
  security-service:
    build:
      context: ./security-service
      dockerfile: Dockerfile
    container_name: platform-security
    environment:
      - DATABASE_URL=postgresql://platform:${POSTGRES_PASSWORD:-changeme}@postgres:5432/platform
      - REDIS_URL=redis://redis:6379
      - PROMETHEUS_URL=http://prometheus:9090
      - SECURITY_SERVICE_PORT=8001
      - SECURITY_VIRUSTOTAL_API_KEY=${SECURITY_VIRUSTOTAL_API_KEY}
      - SECURITY_ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY}
    ports:
      - "8011:8001"  # External port 8011, internal port 8001
    depends_on:
      - postgres
      - redis
    networks:
      - platform-network
    volumes:
      - security_logs:/var/log/security-service
      - security_quarantine:/var/quarantine

  # Job Automation Service
  job-automation-service:
    build:
      context: ./job-automation-service
      dockerfile: Dockerfile
    container_name: platform-job-automation
    environment:
      - DATABASE_URL=postgresql://jobautomation:${JOB_AUTOMATION_POSTGRES_PASSWORD:-changeme}@job-automation-db:5432/jobautomation
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - PLATFORM_URL=http://platform:8000
    volumes:
      - ./job-automation-service:/app
    ports:
      - "8004:8000"
    depends_on:
      - job-automation-db
      - platform
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - platform-network

  job-automation-db:
    image: postgres:15-alpine
    container_name: platform-job-automation-db
    environment:
      - POSTGRES_USER=jobautomation
      - POSTGRES_PASSWORD=${JOB_AUTOMATION_POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=jobautomation
    volumes:
      - jobautomation_db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"  # Expose on port 5433 to avoid conflict with local PostgreSQL
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobautomation"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - platform-network

  # Redis for rate limiting and caching
  redis:
    image: redis:7-alpine
    container_name: platform-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - platform-network
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  seafile_data:
  seafile_db_data:
  jellyfin_config:
  jellyfin_cache:
  gitea_data:
  gitea_db_data:
  prometheus_data:
  grafana_data:
  vaultwarden_data:
  bookstack_data:
  bookstack_db_data:
  education_db_data:
  education_storage:
  redis_data:
  security_logs:
  security_quarantine:
  jobautomation_db_data:

networks:
  platform-network:
    driver: bridge


