---
# Global variables for all hosts

# Timezone
timezone: UTC

# NTP servers
ntp_servers:
  - 0.pool.ntp.org
  - 1.pool.ntp.org
  - 2.pool.ntp.org

# System users
system_users:
  - name: ansible
    groups: sudo,docker
    shell: /bin/bash
    ssh_keys: []

# Firewall
firewall_enabled: true
firewall_allowed_tcp_ports:
  - 22    # SSH
  - 80    # HTTP
  - 443   # HTTPS
  - 8000  # Platform API
  - 5432  # PostgreSQL
  - 9090  # Prometheus
  - 3000  # Grafana

# Log rotation
logrotate_enabled: true
logrotate_retention_days: 30

# Backup settings
backup_enabled: true
backup_retention_days: 30
backup_remote_enabled: false

# Monitoring
monitoring_enabled: true
prometheus_port: 9090
grafana_port: 3000
alertmanager_port: 9093

# Platform settings
platform_version: latest
platform_deploy_path: /opt/platform
platform_data_path: /var/lib/platform
