<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Client Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #1a1a1a;
            color: #fff;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .status-card {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #3a3a3a;
        }
        .status-card h3 {
            margin-bottom: 10px;
            color: #4a9eff;
        }
        .status-value {
            font-size: 24px;
            font-weight: bold;
        }
        .content-section {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Pi Client Dashboard</h1>
        <p>Device: {{ config.device.device_id }}</p>
    </div>
    
    <div class="status-grid">
        <div class="status-card">
            <h3>Status</h3>
            <div class="status-value" id="status">Running</div>
        </div>
        <div class="status-card">
            <h3>Display Mode</h3>
            <div class="status-value" id="display-mode">{{ config.display.mode }}</div>
        </div>
        <div class="status-card">
            <h3>Cache Usage</h3>
            <div class="status-value" id="cache-usage">-</div>
        </div>
    </div>
    
    <div class="content-section">
        <h2>Quick Actions</h2>
        <div style="margin-top: 15px;">
            <a href="/content" style="color: #4a9eff; margin-right: 20px;">Browse Content</a>
            <a href="/settings" style="color: #4a9eff;">Settings</a>
        </div>
    </div>
    
    <script>
        // WebSocket connection for real-time updates
        const ws = new WebSocket(`ws://${window.location.host}/ws`);
        
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.type === 'status_update') {
                document.getElementById('status').textContent = data.status;
            }
        };
        
        // Fetch status periodically
        setInterval(async () => {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                document.getElementById('display-mode').textContent = data.display_mode;
            } catch (e) {
                console.error('Failed to fetch status:', e);
            }
        }, 5000);
    </script>
</body>
</html>
