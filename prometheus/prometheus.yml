global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'production'
    environment: 'on-premise'

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Platform API
  - job_name: 'platform'
    static_configs:
      - targets: ['platform:8000']
    metrics_path: '/api/health'
    scrape_interval: 30s

  # Security Service
  - job_name: 'security-service'
    static_configs:
      - targets: ['security-service:8001']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # Node Exporter - System metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 30s

  # cAdvisor - Container metrics
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 30s

  # PostgreSQL Exporter
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 30s

  # Redis Exporter (if available)
  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']
    scrape_interval: 30s

  # Cursor Exporter - Windows client metrics
  - job_name: 'cursor-exporter'
    static_configs:
      - targets: ['host.docker.internal:9101']  # Windows host
    scrape_interval: 30s
    metrics_path: '/metrics'
    scrape_timeout: 10s

  # WatchTower_main - DAGGR workflow metrics (shared label: project=watchtower_main)
  - job_name: 'watchtower'
    static_configs:
      - targets: ['host.docker.internal:5000']
        labels:
          project: 'watchtower_main'
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s

  # Campaign_kb - DAGGR workflow metrics (shared label: project=campaign_kb)
  - job_name: 'campaign_kb'
    static_configs:
      - targets: ['host.docker.internal:8000']
        labels:
          project: 'campaign_kb'
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s

# Alerting rules
rule_files:
  - '/etc/prometheus/alert_rules.yml'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

# Storage configuration
storage:
  tsdb:
    path: /prometheus
    retention:
      time: 30d
      size: 50GB
