<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #000;
            color: #fff;
        }
        .viewer-container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .media-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }
        video, iframe {
            max-width: 100%;
            max-height: 100%;
        }
        .controls {
            padding: 20px;
            background: #1a1a1a;
            border-top: 1px solid #3a3a3a;
        }
        .back-link {
            color: #4a9eff;
            text-decoration: none;
            margin-bottom: 10px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="viewer-container">
        <div class="media-container" id="media-container">
            <div>Loading content...</div>
        </div>
        <div class="controls">
            <a href="/content" class="back-link">← Back to Content</a>
        </div>
    </div>
    
    <script>
        const contentId = {{ content_id }};
        
        async function loadContent() {
            try {
                // Fetch content details and render
                const container = document.getElementById('media-container');
                container.innerHTML = `<div>Content ID: ${contentId}</div>`;
            } catch (e) {
                console.error('Failed to load content:', e);
            }
        }
        
        loadContent();
    </script>
</body>
</html>
