name: CodeQL

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python, javascript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          output: codeql-results

      - name: Fail on high or critical findings
        if: always()
        run: |
          SARIF_FILE=$(ls codeql-results/*.sarif | head -n 1)
          if [ -z "$SARIF_FILE" ]; then
            echo "No SARIF file found."
            exit 1
          fi
          COUNT=$(jq '[.runs[].results[]? | .properties?."security-severity"? // empty | tonumber? | select(. >= 7.0)] | length' "$SARIF_FILE")
          if [ "$COUNT" -gt 0 ]; then
            echo "Found $COUNT high/critical CodeQL findings."
            exit 1
          fi
