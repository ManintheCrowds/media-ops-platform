name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  changes:
    name: Detect code changes
    runs-on: ubuntu-latest
    outputs:
      code_changed: ${{ steps.filter.outputs.code_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect code changes
        id: filter
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --name-only "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" > changed_files.txt
          elif [ "${{ github.event_name }}" = "push" ] && [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            if git cat-file -e "${{ github.event.before }}^{commit}" 2>/dev/null; then
              git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" > changed_files.txt
            else
              echo "code_changed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          else
            echo "code_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Ignore portfolio docs, gitignore, and env backup churn (e.g. untracking *.env.backup)
          grep -Ev '^(docs/portfolio/|\.gitignore$|.*\.env\.backup$)' changed_files.txt > relevant_files.txt || true

          if [ ! -s relevant_files.txt ]; then
            echo "code_changed=false" >> "$GITHUB_OUTPUT"
          elif grep -Eq '^(app|services|tests|frontend|alembic|scripts|config|nginx|monitoring|security-service|home-cyber-risk|job-automation-service|pi-client|education-service)/|^(Dockerfile|requirements\.txt|pytest\.ini|alembic\.ini|coverage\.ini|docker-compose.*\.yml)$' relevant_files.txt; then
            echo "code_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "code_changed=false" >> "$GITHUB_OUTPUT"
          fi

  lint:
    needs: changes
    if: needs.changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black mypy
      
      - name: Run flake8
        run: |
          flake8 app services --count --select=E9,F63,F7,F82,F821,F824 --show-source --statistics
          flake8 app services --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      
      - name: Run black check
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi
          mapfile -t PY_FILES < <(git diff --name-only "$BASE" "$HEAD" | grep -E '\.py$' || true)
          if [ "${#PY_FILES[@]}" -eq 0 ]; then
            echo "No Python files changed; skipping black"
            exit 0
          fi
          black --check "${PY_FILES[@]}"
      
      - name: Run mypy
        run: mypy app --ignore-missing-imports || true

  unit-tests:
    needs: changes
    if: needs.changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run unit tests
        env:
          ARLO_STORAGE_PATH: /tmp/platform-test/camera_recordings
          ENCODER_STORAGE_PATH: /tmp/platform-test/encoder_recordings
          SECURITY_HIBP_ENABLE_PASSWORD_CHECK: "false"
          SECURITY_HIBP_ENABLE_EMAIL_CHECK: "false"
        run: |
          mkdir -p /tmp/platform-test/camera_recordings /tmp/platform-test/encoder_recordings
          pytest tests/unit -v --cov=app --cov=services --cov-report=xml --cov-report=term-missing --cov-fail-under=0 -m "unit"
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unit
          name: unit-tests-${{ matrix.python-version }}

  integration-tests:
    needs: changes
    if: needs.changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: platform
          POSTGRES_PASSWORD: platform
          POSTGRES_DB: platform_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://platform:platform@localhost:5432/platform_test
          ARLO_STORAGE_PATH: /tmp/platform-test/camera_recordings
          ENCODER_STORAGE_PATH: /tmp/platform-test/encoder_recordings
          SECURITY_HIBP_ENABLE_PASSWORD_CHECK: "false"
          SECURITY_HIBP_ENABLE_EMAIL_CHECK: "false"
        run: |
          mkdir -p /tmp/platform-test/camera_recordings /tmp/platform-test/encoder_recordings
          pytest tests/integration -v --cov=app --cov=services --cov-report=xml --cov-report=term-missing --cov-fail-under=0 -m "integration"
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: integration
          name: integration-tests

  e2e-tests:
    needs: changes
    if: needs.changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run E2E tests
        env:
          ARLO_STORAGE_PATH: /tmp/platform-test/camera_recordings
          ENCODER_STORAGE_PATH: /tmp/platform-test/encoder_recordings
          SECURITY_HIBP_ENABLE_PASSWORD_CHECK: "false"
          SECURITY_HIBP_ENABLE_EMAIL_CHECK: "false"
        run: |
          mkdir -p /tmp/platform-test/camera_recordings /tmp/platform-test/encoder_recordings
          pytest tests/e2e -v -m "e2e" --no-cov
    
    # Note: Full E2E tests with Docker services would require docker-compose setup
    # This is a simplified version

  security-scan:
    needs: changes
    if: needs.changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety
      
      - name: Run Bandit security scan
        run: |
          bandit -r app services -f json -o bandit-report.json --exclude services/camera/arlo_module.py || true
          bandit -r app services -ll --exclude services/camera/arlo_module.py
      
      - name: Check for dependency vulnerabilities
        run: |
          safety check --json || true
          safety check

  coverage-report:
    needs: [changes, unit-tests, integration-tests]
    if: needs.changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Generate coverage report
        run: |
          pytest --cov=app --cov=services --cov-report=html --cov-report=term-missing --cov-fail-under=0
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
