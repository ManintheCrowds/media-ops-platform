name: CodeQL

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  changes:
    name: Detect code changes
    runs-on: ubuntu-latest
    outputs:
      code_changed: ${{ steps.filter.outputs.code_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect code changes
        id: filter
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --name-only "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" > changed_files.txt
          elif [ "${{ github.event_name }}" = "push" ] && [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" > changed_files.txt
          else
            echo "code_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if grep -Eq '^(app|services|tests|frontend|alembic|scripts|config|nginx|monitoring|security-service|home-cyber-risk|job-automation-service|pi-client|education-service)/|^(Dockerfile|requirements\.txt|pytest\.ini|alembic\.ini|coverage\.ini|docker-compose.*\.yml)$' changed_files.txt; then
            echo "code_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "code_changed=false" >> "$GITHUB_OUTPUT"
          fi

  analyze:
    name: Analyze
    needs: changes
    if: needs.changes.outputs.code_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python, javascript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          output: codeql-results
          upload: never

      - name: Fail on high or critical findings
        if: always()
        run: |
          SARIF_FILE=$(ls codeql-results/*.sarif | head -n 1)
          if [ -z "$SARIF_FILE" ]; then
            echo "No SARIF file found."
            exit 1
          fi
          COUNT=$(jq '[.runs[].results[]? | .properties?."security-severity"? // empty | tonumber? | select(. >= 7.0)] | length' "$SARIF_FILE")
          if [ "$COUNT" -gt 0 ]; then
            echo "Found $COUNT high/critical CodeQL findings."
            exit 1
          fi
